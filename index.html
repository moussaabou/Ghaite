<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الرئيسية</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 20px;
      width: 100%;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 30px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      gap: 15px;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      background: rgba(255,255,255,0.08);
      color: white;
      backdrop-filter: blur(10px);
    }

    button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (min-width: 600px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 منصة أدواتك</h1>

    <div class="grid">

      <button onclick="go('certificate-generator.html')">
        🎓 إنشاء شهادة
      </button>

      <button onclick="go('molakhas.html')">
        📄 الملخصات
      </button>

      <button onclick="go('book_summary_pro.html')">
        📚  1 ملخص كتاب احترافي
      </button>

       <button onclick="go('ملخص.html')">
        📚  2 ملخص كتاب احترافي
      </button>
       <button onclick="go('ملخص2.html')">
        📚  3 ملخص كتاب احترافي
      </button>

      <button onclick="go('pdf-image-converter.html')">
        🖼️ تحويل PDF إلى صورة
      </button>

      <button onclick="go('professional_cv_builder_v2.html')">
        💼 إنشاء سيرة ذاتية
      </button>
      

    </div>
  </div>

  <script>
    function go(page) {
      window.location.href = page;
    }
  </script>

</body>
</html>
